apiVersion: apps/v1
kind: Deployment
metadata:
  name: mongodb-deployment
  labels:
    app: mongodb
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mongodb
  template:
    metadata:
      labels:
        app: mongodb
    spec:
      containers:
      - name: mongodb
        image: mongo
        ports:
        - containerPort: 27017
        volumeMounts:
            - name: mongo-storage
              mountPath: /data/db
        env:
        - name: MONGO_INITDB_ROOT_USERNAME
          valueFrom:
            secretKeyRef:
              name: mongodb-secret
              key: mongo-root-username
        - name: MONGO_INITDB_ROOT_PASSWORD
          valueFrom:
            secretKeyRef:
              name: mongodb-secret
              key: mongo-root-password
      volumes:
        - name: mongo-storage
          persistentVolumeClaim:
            claimName: mongo-pvc
--- # document sepparation because you can have multiple files in a yaml file
apiVersion: v1
kind: Service # the kind
metadata: # name/metadata
  name: mongodb-service
spec: 
  selector: # to connect to pod through label
    app: mongodb
  ports:
    - protocol: TCP
      port: 27017  # service port
      targetPort: 27017  # containerPort of Deployment

